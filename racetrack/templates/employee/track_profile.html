{% extends "base.html" %}
{% block content %}
<section class="card">
  <div class="row-space">
    <h2>Track Profile</h2>
    <a class="btn btn-secondary" href="{{ url_for('employee.dashboard') }}">Back</a>
  </div>
  <form method="post" action="{{ url_for('employee.update_track') }}" enctype="multipart/form-data" class="form-grid two-col" data-enhanced>
    {{ form.hidden_tag() }}
    <label>Track Name {{ form.name() }}</label>
    <label>City {{ form.city() }}</label>
    <label>State {{ form.state() }}</label>
    <label>Layout Image {{ form.layout_image() }}</label>
    <div class="full">{{ form.submit(class_='btn') }}</div>
  </form>
  {% if track.layout_image_path %}
    <div class="track-layout-preview">
      <p>Current Layout</p>
      <img src="{{ track.layout_image_path if track.layout_image_path.startswith('http') else url_for('static', filename=track.layout_image_path) }}" alt="Track layout image">
    </div>
  {% endif %}
</section>
{% endblock %}
