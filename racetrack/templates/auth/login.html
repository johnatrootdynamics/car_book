{% extends "base.html" %}
{% block content %}
<section class="card narrow">
  <h2>{{ title }}</h2>
  <form method="post" class="form-grid">
    {{ form.hidden_tag() }}
    <label>Email {{ form.email() }}</label>
    {% for error in form.email.errors %}<small class="field-error">{{ error }}</small>{% endfor %}
    <label>Password {{ form.password() }}</label>
    {% for error in form.password.errors %}<small class="field-error">{{ error }}</small>{% endfor %}
    {{ form.submit(class_='btn') }}
  </form>
</section>
{% endblock %}
