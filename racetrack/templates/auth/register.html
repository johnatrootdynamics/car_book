{% extends "base.html" %}
{% block content %}
<section class="card register-shell">
  <div class="register-intro">
    <h2>Create Driver Account</h2>
    <p>Join your local track community, sign up for events, and get inspection-ready with your unique check-in code.</p>
  </div>
  <form method="post" class="form-grid narrow register-form" data-enhanced>
    {{ form.hidden_tag() }}
    <label>Username {{ form.username() }}</label>
    <label>Full Name {{ form.full_name() }}</label>
    <label>Email {{ form.email() }}</label>
    <label>Phone {{ form.phone() }}</label>
    <label>Class {{ form.driver_class() }}</label>
    <label>Password {{ form.password() }}</label>
    <p class="hint">Use at least 8 characters.</p>
    <div>{{ form.submit(class_='btn') }}</div>
  </form>
</section>
{% endblock %}
